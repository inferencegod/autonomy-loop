<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect x="0" y="0" width="1600" height="900" fill="#F4F1EA" stroke="none" stroke-width="0" rx="0"/><rect x="40" y="40" width="1520" height="820" fill="none" stroke="#D8D1C2" stroke-width="2" rx="26"/><text x="800.0" y="190" font-family="DejaVu Sans" font-size="30" fill="#0E9F6E" text-anchor="middle" font-weight="bold" letter-spacing="8">NO FABRICATION</text><text x="800.0" y="330" font-family="DejaVu Sans" font-size="84" fill="#17181B" text-anchor="middle" font-weight="bold" letter-spacing="0">No fabricated numbers.</text><text x="800.0" y="415" font-family="DejaVu Sans" font-size="84" fill="#0E9F6E" text-anchor="middle" font-weight="bold" letter-spacing="0">Ever.</text><text x="800.0" y="500" font-family="DejaVu Sans" font-size="32" fill="#6E6A60" text-anchor="middle" font-weight="normal" letter-spacing="0">Every stat carries its sample size — or says "building — N/30."</text><rect x="440.0" y="560" width="720" height="2" fill="#D8D1C2" stroke="none" stroke-width="0" rx="0"/><text x="800.0" y="650" font-family="DejaVu Sans" font-size="40" fill="#17181B" text-anchor="middle" font-weight="bold" letter-spacing="0">Empty backlog? It researches, proposes,</text><text x="800.0" y="700" font-family="DejaVu Sans" font-size="40" fill="#0E9F6E" text-anchor="middle" font-weight="bold" letter-spacing="0">and builds the next feature itself.</text><text x="800.0" y="830" font-family="DejaVu Sans" font-size="26" fill="#6E6A60" text-anchor="middle" font-weight="normal" letter-spacing="0">autonomy-loop  ·  a Claude Code plugin  ·  MIT</text></svg>