><line x1="1200" y1="0" x2="1200" y2="900" stroke="#17203A" stroke-width="1"/><line x1="1250" y1="0" x2="1250" y2="900" stroke="#17203A" stroke-width="1"/><line x1="1300" y1="0" x2="1300" y2="900" stroke="#17203A" stroke-width="1"/><line x1="1350" y1="0" x2="1350" y2="900" stroke="#17203A" stroke-width="1"/><line x1="1400" y1="0" x2="1400" y2="900" stroke="#17203A" stroke-width="1"/><line x1="1450" y1="0" x2="1450" y2="900" stroke="#17203A" stroke-width="1"/><line x1="1500" y1="0" x2="1500" y2="900" stroke="#17203A" stroke-width="1"/><line x1="1550" y1="0" x2="1550" y2="900" stroke="#17203A" stroke-width="1"/><line x1="1600" y1="0" x2="1600" y2="900" stroke="#17203A" stroke-width="1"/><line x1="0" y1="0" x2="1600" y2="0" stroke="#17203A" stroke-width="1"/><line x1="0" y1="50" x2="1600" y2="50" stroke="#17203A" stroke-width="1"/><line x1="0" y1="100" x2="1600" y2="100" stroke="#17203A" stroke-width="1"/><line x1="0" y1="150" x2="1600" y2="150" stroke="#17203A" stroke-width="1"/><line x1="0" y1="200" x2="1600" y2="200" stroke="#17203A" stroke-width="1"/><line x1="0" y1="250" x2="1600" y2="250" stroke="#17203A" stroke-width="1"/><line x1="0" y1="300" x2="1600" y2="300" stroke="#17203A" stroke-width="1"/><line x1="0" y1="350" x2="1600" y2="350" stroke="#17203A" stroke-width="1"/><line x1="0" y1="400" x2="1600" y2="400" stroke="#17203A" stroke-width="1"/><line x1="0" y1="450" x2="1600" y2="450" stroke="#17203A" stroke-width="1"/><line x1="0" y1="500" x2="1600" y2="500" stroke="#17203A" stroke-width="1"/><line x1="0" y1="550" x2="1600" y2="550" stroke="#17203A" stroke-width="1"/><line x1="0" y1="600" x2="1600" y2="600" stroke="#17203A" stroke-width="1"/><line x1="0" y1="650" x2="1600" y2="650" stroke="#17203A" stroke-width="1"/><line x1="0" y1="700" x2="1600" y2="700" stroke="#17203A" stroke-width="1"/><line x1="0" y1="750" x2="1600" y2="750" stroke="#17203A" stroke-width="1"/><line x1="0" y1="800" x2="1600" y2="800" stroke="#17203A" stroke-width="1"/><line x1="0" y1="850" x2="1600" y2="850" stroke="#17203A" stroke-width="1"/><line x1="0" y1="900" x2="1600" y2="900" stroke="#17203A" stroke-width="1"/><rect x="36" y="36" width="1528" height="828" fill="none" stroke="#2A3656" stroke-width="2" rx="24" opacity="1"/><text x="800.0" y="150" font-family="DejaVu Sans" font-size="28" fill="#22D3EE" text-anchor="middle" font-weight="bold" letter-spacing="8">WHY IT'S SAFE</text><text x="800.0" y="235" font-family="DejaVu Sans" font-size="62" fill="#EAF0FF" text-anchor="middle" font-weight="bold" letter-spacing="0">It can't lie. It can't wreck your repo.</text><rect x="250" y="334" width="16" height="16" fill="#22D3EE" stroke="none" stroke-width="0" rx="3" opacity="1"/><text x="295" y="360" font-family="DejaVu Sans" font-size="31" fill="#EAF0FF" text-anchor="start" font-weight="bold" letter-spacing="0">No fabricated numbers.</text><text x="295" y="398" font-family="DejaVu Sans Mono" font-size="26" fill="#8C99B8" text-anchor="start" font-weight="normal" letter-spacing="0">every stat carries its sample size, or says "building".</text><rect x="250" y="452" width="16" height="16" fill="#22D3EE" stroke="none" stroke-width="0" rx="3" opacity="1"/><text x="295" y="478" font-family="DejaVu Sans" font-size="31" fill="#EAF0FF" text-anchor="start" font-weight="bold" letter-spacing="0">Frozen-invariant gate.</text><text x="295" y="516" font-family="DejaVu Sans Mono" font-size="26" fill="#8C99B8" text-anchor="start" font-weight="normal" letter-spacing="0">your output stays byte-identical until YOU re-baseline.</text><rect x="250" y="570" width="16" height="16" fill="#22D3EE" stroke="none" stroke-width="0" rx="3" opacity="1"/><text x="295" y="596" font-family="DejaVu Sans" font-size="31" fill="#EAF0FF" text-anchor="start" font-weight="bold" letter-spacing="0">Hard-blocked by a hook.</text><text x="295" y="634" font-family="DejaVu Sans Mono" font-size="26" fill="#8C99B8" text-anchor="start" font-weight="normal" letter-spacing="0">prod push, force-push, history rewrite, protected files.</text><rect x="250" y="688" width="16" height="16" fill="#22D3EE" stroke="none" stroke-width="0" rx="3" opacity="1"/><text x="295" y="714" font-family="DejaVu Sans" font-size="31" fill="#EAF0FF" text-anchor="start" font-weight="bold" letter-spacing="0">Adversarial 5-lens review.</text><text x="295" y="752" font-family="DejaVu Sans Mono" font-size="26" fill="#8C99B8" text-anchor="start" font-weight="normal" letter-spacing="0">all five must pass, and it red-teams its own verdict.</text><text x="800.0" y="836" font-family="DejaVu Sans" font-size="24" fill="#8C99B8" text-anchor="middle" font-weight="normal" letter-spacing="0">autonomy-loop  ·  a Claude Code plugin  ·  MIT</text></svg>