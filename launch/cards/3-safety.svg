<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect x="0" y="0" width="1600" height="900" fill="#F4F1EA" stroke="none" stroke-width="0" rx="0"/><rect x="40" y="40" width="1520" height="820" fill="none" stroke="#D8D1C2" stroke-width="2" rx="26"/><text x="800.0" y="190" font-family="DejaVu Sans" font-size="30" fill="#DC2626" text-anchor="middle" font-weight="bold" letter-spacing="8">SAFETY GATE</text><text x="800.0" y="290" font-family="DejaVu Sans" font-size="74" fill="#17181B" text-anchor="middle" font-weight="bold" letter-spacing="0">It can't wreck your repo.</text><text x="440" y="400" font-family="DejaVu Sans" font-size="44" fill="#DC2626" text-anchor="middle" font-weight="bold" letter-spacing="0">×</text><text x="490" y="400" font-family="DejaVu Sans Mono" font-size="36" fill="#17181B" text-anchor="start" font-weight="normal" letter-spacing="0">push / force-push to prod</text><text x="440" y="472" font-family="DejaVu Sans" font-size="44" fill="#DC2626" text-anchor="middle" font-weight="bold" letter-spacing="0">×</text><text x="490" y="472" font-family="DejaVu Sans Mono" font-size="36" fill="#17181B" text-anchor="start" font-weight="normal" letter-spacing="0">history rewrite · reset --hard</text><text x="440" y="544" font-family="DejaVu Sans" font-size="44" fill="#DC2626" text-anchor="middle" font-weight="bold" letter-spacing="0">×</text><text x="490" y="544" font-family="DejaVu Sans Mono" font-size="36" fill="#17181B" text-anchor="start" font-weight="normal" letter-spacing="0">edits to protected files</text><text x="800.0" y="680" font-family="DejaVu Sans" font-size="30" fill="#6E6A60" text-anchor="middle" font-weight="normal" letter-spacing="0">A frozen-invariant gate keeps your output byte-identical until YOU re-baseline.</text><text x="800.0" y="830" font-family="DejaVu Sans" font-size="26" fill="#6E6A60" text-anchor="middle" font-weight="normal" letter-spacing="0">autonomy-loop  ·  a Claude Code plugin  ·  MIT</text></svg>