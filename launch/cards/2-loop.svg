<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect x="0" y="0" width="1600" height="900" fill="#F4F1EA" stroke="none" stroke-width="0" rx="0"/><rect x="40" y="40" width="1520" height="820" fill="none" stroke="#D8D1C2" stroke-width="2" rx="26"/><text x="800.0" y="190" font-family="DejaVu Sans" font-size="30" fill="#0E9F6E" text-anchor="middle" font-weight="bold" letter-spacing="8">THE LOOP</text><text x="800.0" y="290" font-family="DejaVu Sans" font-size="78" fill="#17181B" text-anchor="middle" font-weight="bold" letter-spacing="0">They pass a git baton.</text><rect x="190" y="400" width="500" height="230" fill="#ffffff" stroke="#0E9F6E" stroke-width="3" rx="18"/><text x="440" y="470" font-family="DejaVu Sans" font-size="34" fill="#0E9F6E" text-anchor="middle" font-weight="bold" letter-spacing="2">T1 · BUILDER</text><text x="440" y="525" font-family="DejaVu Sans Mono" font-size="27" fill="#6E6A60" text-anchor="middle" font-weight="normal" letter-spacing="0">writes code + a test,</text><text x="440" y="565" font-family="DejaVu Sans Mono" font-size="27" fill="#6E6A60" text-anchor="middle" font-weight="normal" letter-spacing="0">runs the gate, commits</text><rect x="910" y="400" width="500" height="230" fill="#ffffff" stroke="#C2410C" stroke-width="3" rx="18"/><text x="1160" y="470" font-family="DejaVu Sans" font-size="34" fill="#C2410C" text-anchor="middle" font-weight="bold" letter-spacing="2">T2 · REVIEWER</text><text x="1160" y="525" font-family="DejaVu Sans Mono" font-size="27" fill="#6E6A60" text-anchor="middle" font-weight="normal" letter-spacing="0">re-runs the gate,</text><text x="1160" y="565" font-family="DejaVu Sans Mono" font-size="27" fill="#6E6A60" text-anchor="middle" font-weight="normal" letter-spacing="0">5-lens review, fix/flag</text><path d="M 700 460 L 900 460" stroke="#0E9F6E" stroke-width="4" fill="none"/><polygon points="900,460 882,451 882,469" fill="#0E9F6E"/><path d="M 900 575 L 700 575" stroke="#C24